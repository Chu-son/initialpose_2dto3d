services:
  ros2_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: initialpose_2dto3d_container
    volumes:
      - ./src:/ros2_ws/src
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    command: bash
